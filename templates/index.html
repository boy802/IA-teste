<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduAI - Assistente Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080d1a;
      --panel:      #111827;
      --border:     #1e2d47;
      --accent:     #3b82f6;
      --accent-glow:#3b82f640;
      --bubble-ai:  #141e33;
      --bubble-user:#1e3a8a;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --text-dim:   #94a3b8;
      --radius:     14px;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 10%, #0f2a5520 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, #1a1a4020 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT: fixed inset so mobile browser chrome doesn't steal space ── */
    .app {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #0d1424f0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
      animation: logoPulse 4s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 16px var(--accent-glow); }
      50%       { box-shadow: 0 0 28px #3b82f660; }
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(90deg, #e2e8f0, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e80;
      animation: blink 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
      /* push content to bottom when few messages */
      justify-content: flex-start;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── WELCOME ── */
    .welcome {
      text-align: center;
      padding: 32px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.6s ease both;
    }

    .welcome-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 28px #3b82f640;
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      background: linear-gradient(90deg, #e2e8f0, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }

    .suggestion-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .suggestion-btn:hover, .suggestion-btn:active {
      background: var(--bubble-ai);
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── MESSAGES ── */
    .message {
      display: flex;
      gap: 10px;
      align-items: flex-end;  /* align avatar to bottom of bubble */
      animation: fadeUp 0.3s ease both;
      width: 100%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* User messages: avatar RIGHT, bubble pushed right */
    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .avatar.ai {
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .avatar.user {
      background: var(--bubble-user);
      border: 1px solid #3b82f650;
    }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 12px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.ai .bubble {
      background: var(--bubble-ai);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--bubble-user);
      border: 1px solid #3b82f640;
      border-bottom-right-radius: 4px;
      color: #dbeafe;
    }

    /* ── TYPING INDICATOR ── */
    .typing-indicator {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
    }

    .typing-bubble {
      background: var(--bubble-ai);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .typing-text {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 2px;
    }

    .typing-dots { display: flex; gap: 4px; }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot 1.4s ease-in-out infinite both;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
      background: linear-gradient(0deg, var(--bg) 70%, transparent 100%);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      flex: 1;
      min-width: 0;          /* prevents overflow in flex */
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-muted); }
    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .send-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;       /* never shrink */
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #2563eb;
      box-shadow: 0 0 16px var(--accent-glow);
      transform: scale(1.05);
    }

    .send-btn:active:not(:disabled) { transform: scale(0.95); }

    .send-btn:disabled {
      background: var(--border);
      cursor: default;
      opacity: 0.5;
    }

    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .input-footer {
      text-align: center;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── DESKTOP ── */
    @media (min-width: 601px) {
      .chat-area { padding: 28px 24px; }
      .input-area { padding: 14px 24px 20px; }
      header { padding: 18px 24px; }
      .bubble { max-width: 72%; }
    }

    /* ── MARKDOWN INSIDE BUBBLES ── */
    .bubble strong { font-weight: 600; color: #cbd5e1; }
    .bubble em { font-style: italic; color: #94a3b8; }
    .bubble h1, .bubble h2, .bubble h3 {
      font-weight: 600;
      margin: 10px 0 4px;
      color: #e2e8f0;
    }
    .bubble h1 { font-size: 16px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }
    .bubble ol, .bubble ul {
      margin: 8px 0;
      padding-left: 20px;
    }
    .bubble ol { list-style: decimal; }
    .bubble ul { list-style: disc; }
    .bubble li {
      margin: 4px 0;
      line-height: 1.6;
    }
    .bubble code {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12.5px;
      color: #93c5fd;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo-icon">🤖</div>
    <div class="header-text">
      <h1>EduAI</h1>
      <p>Assistente Inteligente</p>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      <span>Online</span>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Olá! Sou o EduAI</h2>
      <p>Seu assistente inteligente pronto para responder dúvidas, ajudar com estudos e muito mais.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">💡 O que você pode fazer?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">📚 Me ajude a estudar</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">✍️ Crie um resumo</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🧮 Resolva um problema</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Escreva sua mensagem..."
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Enviar">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-footer">EduAI pode cometer erros. Verifique informações importantes.</p>
  </div>

</div>

<script>
  const chatArea  = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const welcome   = document.getElementById('welcome');

  userInput.addEventListener('input', () => {
    sendBtn.disabled = !userInput.value.trim();
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  function sendSuggestion(btn) {
    userInput.value = btn.textContent.replace(/^[^\w\s]+\s*/, '').trim();
    sendBtn.disabled = false;
    sendMessage();
  }

  function parseMarkdown(text) {
    let t = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // bold+italic, bold, italic
    t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // numbered list lines -> wrap in ol
    t = t.replace(/((?:^\d+\.\s.+$\n?)+)/gm, function(block) {
      const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\.\s+/, '') + '</li>').join('');
      return '<ol>' + items + '</ol>';
    });
    // bullet lines -> wrap in ul
    t = t.replace(/((?:^[\*\-]\s.+$\n?)+)/gm, function(block) {
      const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^[\*\-]\s+/, '') + '</li>').join('');
      return '<ul>' + items + '</ul>';
    });
    // remaining newlines to <br>
    t = t.replace(/\n/g, '<br>');
    return t;
  }

  function appendMessage(role, text) {
    if (welcome) welcome.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + role;
    avatar.textContent = role === 'ai' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      bubble.innerHTML = parseMarkdown(text);
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    scrollToBottom();
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'typing-indicator';
    wrap.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML =
      '<span class="typing-text">EduAI está digitando</span>' +
      '<div class="typing-dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      if (!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      hideTyping();
      appendMessage('ai', data.answer || 'Não obtive uma resposta. Tente novamente.');
    } catch (err) {
      hideTyping();
      appendMessage('ai', '⚠️ Não foi possível conectar ao servidor. Verifique a conexão e tente novamente.');
      console.error('EduAI API error:', err);
    }
  }
</script>
</body>
</html>
