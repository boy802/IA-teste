<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduAI - Assistente Inteligente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== seu CSS original (mantido igual) ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080d1a;
      --surface: #0d1424;
      --panel: #111827;
      --border: #1e2d47;
      --accent: #3b82f6;
      --accent-glow:#3b82f640;
      --bubble-ai:#141e33;
      --bubble-user:#1e3a8a;
      --text:#e2e8f0;
      --text-muted:#64748b;
      --radius:14px;
      --font:'Inter',system-ui,sans-serif;
    }

    body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar.ai { background: var(--accent); }
    .avatar.user { background: var(--bubble-user); }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.ai .bubble {
      background: var(--bubble-ai);
      border: 1px solid var(--border);
    }

    .message.user .bubble {
      background: var(--bubble-user);
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      background: var(--panel);
      padding: 10px;
      border-radius: 12px;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      resize: none;
      font-size: 14px;
    }

    button {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="app">

<header>
  <div class="logo-icon">🤖</div>
  <h1>EduAI</h1>
</header>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="userInput" placeholder="Digite sua mensagem..."></textarea>
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

</div>

<script>
const chatArea = document.getElementById("chatArea");
const input = document.getElementById("userInput");

/* ===== FORMATADOR (CORREÇÃO PRINCIPAL) ===== */
function formatText(text) {
  return text
    .replace(/\n/g, "<br>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/- /g, "• ");
}

/* ===== MENSAGEM ===== */
function addMessage(role, text) {
  const msg = document.createElement("div");
  msg.className = "message " + role;

  const avatar = document.createElement("div");
  avatar.className = "avatar " + role;
  avatar.innerText = role === "ai" ? "🤖" : "👤";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (role === "ai") {
    bubble.innerHTML = formatText(text);
  } else {
    bubble.innerText = text;
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);

  chatArea.scrollTop = chatArea.scrollHeight;
}

/* ===== ENVIAR ===== */
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text})
    });

    const data = await res.json();

    addMessage("ai", data.answer || "Erro ao responder.");
  } catch (e) {
    addMessage("ai", "Erro de conexão com o servidor.");
  }
}
</script>

</body>
</html>
